name: Build spot forecast cache

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-spot-cache
  cancel-in-progress: false

jobs:
  build-spot-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Check out cache-data branch
        uses: actions/checkout@v4
        with:
          ref: cache-data
          path: cache-repo

      - name: Placeholder
        run: |
          echo "Spot cache workflow shell created."