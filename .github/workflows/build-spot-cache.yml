      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Run spot cache build
        run: |
          Rscript main-repo/scripts/build_spot_superfog_cache.R
        env:
          CACHE_OUT_DIR: cache-repo/cache

      - name: Commit cache output
        run: |
          cd cache-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add cache/superfog_cache.rds

          if git diff --cached --quiet; then
            echo "No spot cache changes to commit."
          else
            git commit -m "Update spot forecast superfog cache"
            git push origin cache-data
          fi